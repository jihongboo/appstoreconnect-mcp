name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-latest
    env:
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app

      - name: Build (release)
        run: swift build -c release

      - name: Import Apple Code Signing Certificate
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 12)

          # Decode certificate
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign
          
          # Allow codesign to access the key
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # Add keychain to user search list
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | xargs)

      - name: Code Sign Binary
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' }}
        env:
          DEVELOPER_ID_APPLICATION_NAME: ${{ secrets.DEVELOPER_ID_APPLICATION_NAME }}
        run: |
          codesign --force --options runtime --sign "${DEVELOPER_ID_APPLICATION_NAME}" --timestamp --verbose .build/release/appstoreconnect-mcp

      - name: Notarize Binary
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.ASC_KEY_ID != '' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          # Pack binary into zip for notarization
          zip -j .build/release/appstoreconnect-mcp.zip .build/release/appstoreconnect-mcp
          
          # Write private key for notarytool
          mkdir -p ~/.private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          
          # Submit to Apple notarization service and wait
          xcrun notarytool submit .build/release/appstoreconnect-mcp.zip \
            --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: appstoreconnect-mcp
          path: |
            .build/release/appstoreconnect-mcp
            .build/release/appstoreconnect-mcp.zip
          if-no-files-found: warn

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" .build/release/appstoreconnect-mcp --clobber
          if [ -f .build/release/appstoreconnect-mcp.zip ]; then
            gh release upload "${GITHUB_REF_NAME}" .build/release/appstoreconnect-mcp.zip --clobber
          fi

      - name: Update Homebrew Formula
        if: startsWith(github.ref, 'refs/tags/v') && env.HOMEBREW_TAP_TOKEN != ''
        run: |
          # Calculate SHA256 of the zip file
          SHA256=$(shasum -a 256 .build/release/appstoreconnect-mcp.zip | awk '{print $1}')
          
          # Parse clean version string (removing leading v)
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          
          # Define final download URL
          DOWNLOAD_URL="https://github.com/${{ github.repository_owner }}/appstoreconnect-mcp/releases/download/${{ github.ref_name }}/appstoreconnect-mcp.zip"
          
          # Interpolate template into formula file
          sed -e "s|__OWNER__|${{ github.repository_owner }}|g" \
              -e "s|__URL__|${DOWNLOAD_URL}|g" \
              -e "s|__SHA256__|${SHA256}|g" \
              -e "s|__VERSION__|${VERSION}|g" \
              .github/formula_template.rb > appstoreconnect-mcp.rb
              
          # Clone target homebrew-tap repo
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${{ github.repository_owner }}/homebrew-tap.git homebrew-tap-repo
          cd homebrew-tap-repo
          mkdir -p Formula
          cp ../appstoreconnect-mcp.rb Formula/appstoreconnect-mcp.rb
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit and push
          git add Formula/appstoreconnect-mcp.rb
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes detected in Formula file."
          else
            git commit -m "Update appstoreconnect-mcp to version ${VERSION}"
            git push origin main || git push origin master
          fi

